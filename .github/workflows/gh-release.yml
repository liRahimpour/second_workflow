on: workflow_dispatch
name: gh-Release
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build artifact
        run: |
          mkdir dist
          echo "hello" > dist/app.txt

      - name: Create release with asset
        run: |
          gh release create v1.0.0 dist/app.txt \
            --title "v1.0.0" \
            --notes "First release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}